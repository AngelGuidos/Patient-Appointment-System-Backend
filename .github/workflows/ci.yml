name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: PatientAppointmentSystemDb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirement.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-asyncio pytest-mock
        pip install -r requirement.txt
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Wait for MySQL
      run: |
        timeout 30s bash -c "until mysql -h127.0.0.1 -P3306 -uroot -proot -e 'SELECT 1;' > /dev/null 2>&1; do sleep 1; done"
        
    - name: Test with pytest
      env:
        SYNC_DATABASE_URL: "mysql+pymysql://root:root@127.0.0.1/PatientAppointmentSystemDb"
        ASYNC_DATABASE_URL: "mysql+aiomysql://root:root@127.0.0.1/PatientAppointmentSystemDb"
        DATABASE_URL: "mysql://root:root@127.0.0.1:3306/PatientAppointmentSystemDb"
        SECRET_KEY: "test_secret_key"
        ALGORITHM: "HS256"
        ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      run: |
        pytest tests/ -v